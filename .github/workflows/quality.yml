name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: Workspace and license boundaries
    runs-on: macos-14
    timeout-minutes: 75
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust quality components
        run: rustup update stable --no-self-update && rustup component add rustfmt clippy
      - name: Install pinned PDFium for runner architecture
        run: sh scripts/fetch-pdfium.sh
      - name: Run deterministic workspace suite
        run: sh scripts/test.sh

  bundles:
    name: Standard and minimal release bundles
    runs-on: macos-14
    timeout-minutes: 75
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: rustup update stable --no-self-update
      - name: Build standard reader
        run: cargo build --locked --release -p gpui-pdf-reader
      - name: Build minimal reader
        run: cargo build --locked --release -p gpui-pdf-reader --no-default-features
